<!DOCTYPE html>
<html>
<head>
    <title>My Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            padding: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        .book {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h2>📚 My Library</h2>

<!-- ADD BOOK -->
<form method="POST">
    <input name="title" placeholder="Book Title" required>
    <input name="author" placeholder="Author" required>

    <select name="status">
        <option value="owned">Owned</option>
        <option value="reading">Reading</option>
        <option value="completed">Completed</option>
        <option value="wishlist">Wishlist</option>
    </select>

    <button type="submit">Add Book</button>
</form>

<!-- SEARCH -->
<form method="GET">
    <input name="search" placeholder="Search books..." value="{{ search or '' }}">

    <select name="status">
        <option value="">All</option>
        <option value="owned">Owned</option>
        <option value="reading">Reading</option>
        <option value="completed">Completed</option>
        <option value="wishlist">Wishlist</option>
    </select>

    <button type="submit">Search</button>
</form>

<hr>

<!-- BOOK LIST -->
{% for book in books %}
<div class="book">

    <b>Title:</b> {{ book[1] }}<br>
    <b>Author:</b> {{ book[2] }}<br>
    <b>Status:</b> {{ book[3] }}<br>

    <a href="/delete/{{ book[0] }}">Delete</a>
    <a href="/edit/{{ book[0] }}">Edit Status</a>

</div>
{% endfor %}

</body>
</html>
